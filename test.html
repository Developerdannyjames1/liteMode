<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>LightMode Ministries | Welcome Section with Scroll Float Animation</title>
  <!-- Google Fonts (optional, for refined typography) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>

/* Initial state (hidden + float from bottom) */
.img-container {
  opacity: 0;
  transform: translateY(120px) scale(0.9);
  transition: all 0.9s cubic-bezier(0.22, 1, 0.36, 1);
}

/* When visible */
.img-container.show {
  opacity: 1;
  transform: translateY(0) scale(1);
}
  </style>
</head>
<body>

<!-- Welcome Section (exactly your provided structure, with slight modifications to add scroll <!-- Welcome Section -->
<!-- Welcome Section -->
<section class="relative w-full min-h-screen flex items-center justify-center py-20 px-4 bg-white">
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-20 left-10 w-64 h-64 bg-yellow-200 rounded-full mix-blend-multiply filter blur-3xl opacity-30 float-anim"></div>
    <div class="absolute bottom-20 right-10 w-96 h-96 bg-orange-200 rounded-full mix-blend-multiply filter blur-3xl opacity-30 float-anim-delay"></div>
    <div class="absolute top-1/2 left-1/3 w-48 h-48 bg-pink-200 rounded-full mix-blend-multiply filter blur-3xl opacity-20 float-anim-delay-2"></div>
  </div>

  <div class="relative max-w-7xl mx-auto w-full">
    <div class="text-center mb-16 w-[90%] md:w-[50%] mx-auto">
      <h2 class="text-3xl md:text-4xl mb-4">
        <span class="text-[#0A1A2F] font-extrabold">Welcome Lets Begin</span>
      </h2>
      <p class="text-[#0A1A2F] font-light text-[16px]">
        LightMode Ministries is a Christian media ministry dedicated to illuminating lives with the truth of God's Word through storytelling, digital media, and Scripture-centered teaching.
      </p>
    </div>

    <div class="relative h-[600px] md:h-[700px]">
      <!-- Main Center Image -->
      <div class="absolute left-1/2 top-1/2 transform -translate-x-1/2 -translate-y-1/2 z-20">
        <div class="img-container w-80 h-96 md:w-96 md:h-[450px] overflow-hidden relative group transform transition-transform duration-500 ease-in-out hover:translate-x-12">
          <img src="/images/center-kids.png" alt="Children learning about the Bible" class="w-full h-full" loading="lazy">
        </div>
      </div>

      <!-- Left Side Images -->
      <div class="absolute left-4 md:left-20 top-10 z-10">
        <div class="img-container w-40 h-52 md:w-48 md:h-64 overflow-hidden relative group transform transition-transform duration-500 ease-in-out hover:-translate-x-8">
          <img src="/images/left-top-kids.png" alt="Group of children studying" class="w-full h-full" loading="lazy">
        </div>
      </div>

      <div class="absolute left-10 md:left-32 bottom-20 z-10">
        <div class="img-container w-32 h-40 md:w-36 md:h-44 rounded-full overflow-hidden relative transform transition-transform duration-500 ease-in-out hover:-translate-x-8">
          <img src="/images/Ellipse 1.png" alt="Happy child portrait" class="w-full h-full" loading="lazy">
        </div>
      </div>

      <!-- Right Side Images -->
      <div class="absolute right-4 md:right-20 top-5 z-10">
        <div class="img-container w-36 h-44 md:w-44 md:h-56 overflow-hidden relative transform transition-transform duration-500 ease-in-out hover:translate-x-8">
          <img src="/images/single-kid.png" alt="Young boy smiling" class="w-full h-full" loading="lazy">
        </div>
      </div>

      <div class="absolute right-8 md:right-24 bottom-10 z-10">
        <div class="img-container w-44 h-36 md:w-56 md:h-44 overflow-hidden relative transform transition-transform duration-500 ease-in-out hover:translate-x-8">
          <img src="/images/right-bottom.png" alt="Girl with backpack reading" class="w-full h-full" loading="lazy">
        </div>
      </div>

      <!-- Decorative Icons -->
      <div class="absolute left-1/4 top-1/4 float-anim" aria-hidden="true">
        <img src="/images/Vector.svg" alt="">
      </div>
      <div class="absolute right-1/3 top-1/3 float-anim-delay" aria-hidden="true">
        <img src="/images/Vector (1).svg" alt="">
      </div>
      <div class="absolute left-1/3 bottom-1/4 float-anim-delay-2" aria-hidden="true">
        <img src="/images/Vector (2).svg" alt="">
      </div>
    </div>
  </div>
</section>


<script>
const images = document.querySelectorAll('.img-container');

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('show');
    }
  });
}, {
  threshold: 0.2
});

// Apply stagger effect
images.forEach((img, index) => {
  observer.observe(img);
  img.style.transitionDelay = `${index * 0.2}s`;
});
</script>

</body>
</html>
